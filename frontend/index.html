<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillScan — Customer Profiling</title>

  <!-- CDN Dependencies -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    // Render backend URL
    window.BS_API_BASE = 'https://labalab-billscanner.onrender.com';
    window.BS = {};
  </script>

  <style>
    :root {
      --bg: #0f172a; --bg2: #0a0f1e;
      --surface: #1e293b; --surface2: #263248;
      --border: #334155;
      --accent: #7c3aed; --accent-light: #a78bfa; --accent-dim: rgba(124,58,237,0.15);
      --green: #10b981; --gold: #f59e0b; --blue: #3b82f6; --orange: #f97316; --red: #ef4444;
      --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
      --radius: 10px; --radius-sm: 6px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
    #root { display: flex; flex-direction: column; min-height: 100vh; }

    .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--accent-light); letter-spacing: -0.5px; margin-right: 12px; white-space: nowrap; }
    .nav-logo span { color: var(--text-muted); font-weight: 400; }
    .nav-links { display: flex; gap: 2px; flex: 1; }
    .nav-link { padding: 6px 14px; border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; border: none; background: none; white-space: nowrap; }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent-light); background: var(--accent-dim); }

    .main { flex: 1; padding: 28px 32px; max-width: 1280px; margin: 0 auto; width: 100%; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; white-space: nowrap; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface2); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }

    .input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 14px; width: 100%; transition: border-color .15s; outline: none; }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text-dim); }
    .input-sm { padding: 5px 9px; font-size: 13px; }
    select.input { cursor: pointer; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-warn  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
    .alert-info  { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); color: var(--accent-light); }
    .alert-ok    { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; max-width: 320px; margin: 0 auto 20px; }

    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; background: var(--bg); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 480px; width: 100%; box-shadow: var(--shadow); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .main { padding: 16px; }
      .grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .nav-logo span { display: none; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load order matters: utils first, then components, then app -->
  <script type="text/babel" src="utils/categories.js"></script>
  <script type="text/babel" src="utils/analytics.js"></script>
  <script type="text/babel" src="utils/pdfReader.js"></script>
  <script type="text/babel" src="utils/auth.js"></script>
  <script type="text/babel" src="utils/storage.js"></script>
  <script type="text/babel" src="utils/claudeApi.js"></script>
  <script type="text/babel" src="components/Login.js"></script>
  <script type="text/babel" src="components/Settings.js"></script>
  <script type="text/babel" src="components/Uploader.js"></script>
  <script type="text/babel" src="components/BillReview.js"></script>
  <script type="text/babel" src="components/Dashboard.js"></script>
  <script type="text/babel" src="components/CustomerList.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
